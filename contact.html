<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お問い合わせ | すまいる</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }
    .hero { background-color: #5EBEC4; color: white; }
    .contact-form input, .contact-form textarea { margin-bottom: 1rem; }
    .footer { background-color: #f5f5f5; padding: 2rem 1rem; }
  </style>
</head>
<body>
  <section class="hero is-small">
    <div class="hero-body has-text-centered">
      <h1 class="title is-3">お問い合わせ</h1>
      <p class="subtitle is-5">ご相談・ご依頼はこちらから</p>
    </div>
  </section>
  <section class="section">
    <div class="container">
      <div class="box contact-form">
        <form action="https://formsubmit.co/tksh0828@gmail.com" method="POST">
          <input type="hidden" name="_next" value="thanks.html">
          <input type="hidden" name="_captcha" value="false">
          <div class="field">
            <label class="label">お名前</label>
            <div class="control"><input class="input" type="text" name="name" required></div>
          </div>
          <div class="field">
            <label class="label">メールアドレス</label>
            <div class="control"><input class="input" type="email" name="email" required></div>
          </div>
          <div class="field">
            <label class="label">お問い合わせ内容</label>
            <div class="control"><textarea class="textarea" name="message" required></textarea></div>
          </div>
          <div class="control"><button class="button is-link is-fullwidth" type="submit">送信</button></div>
        </form>
      </div>
    </div>
  </section>
  <footer class="footer has-text-centered">
    <p>&copy; 2025 すまいる</p>
  </footer>
</body>
</html>
