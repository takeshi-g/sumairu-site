<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSAP 動作確認テスト</title>
    <style>
      body {
        /* 見やすくするための余白と背景色 */
        padding: 50px;
        background-color: #f4f4f4;
        font-family: sans-serif;
      }

      /* 動かす対象の箱（ボックス）のスタイル */
      .box {
        width: 100px;
        height: 100px;
        background-color: #3498db; /* 初期色は青 */
        border-radius: 10px; /* 少し角を丸く */

        /* テキストを中央に配置 */
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>GSAP 動作確認</h1>
    <p>下の箱が動けば、GSAPの読み込みは成功しています！</p>

    <!-- アニメーションさせる対象の要素 -->
    <div class="box">動くよ！</div>

    <!-- 
    1. ここでGSAP本体を読み込みます。
    ※ダウンロードした「minified」フォルダ内の「gsap.min.js」を
      このHTMLファイルと同じ階層（または適切なフォルダ）に置いてください。
  -->
    <script src="./assets/js/gsap.min.js"></script>

    <!-- 
    2. GSAPを使ったアニメーションの記述 
  -->
    <script>
      // '.box' というクラスを持つ要素をアニメーションさせる
      gsap.to(".box", {
        x: 300, // 右へ300px移動
        rotation: 360, // 360度回転
        backgroundColor: "#e74c3c", // 色を赤に変更
        duration: 2, // 2秒かけてアニメーションする
        delay: 0.5, // 0.5秒待ってから開始
        ease: "power2.inOut", // 動きの緩急（ゆっくり始まってゆっくり終わる）
      });
    </script>
  </body>
</html>
